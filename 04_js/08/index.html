<!DOCTYPE html>
<!--문서양식=HTML, 사용언어=한국어-->
<html lang="ko">
<head>
    <!--문자 유실 방지를 위한 유니코드 설정-->
    <meta charset="utf-8">
    <!--탭 상단에 H.W.로 노출-->
    <title>h.w.</title>
    <!--rel=stylesheet로 설정, 시트 소스 경로는 하단과 같음-->
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <!--대제목 설정-->
    <h1>click it</h1>
    <!--버튼에 id:btn으로 부여, 노출 텍스트는 click me-->
    <button id="button">click me</button>
    <!--문장 id:txtresult로 부여, 노출 텍스트 기본값은 0번 눌렀어요-->
    <p id="txtresult">0번 눌렀어요</p>
    <!--javascript 파일 경로는 하단과 같음-->
    <script src="./scripts/main.js"></script>
</body>
</html>
