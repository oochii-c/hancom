<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator" role="application" aria-label="계산기">
    <div class="display">
      <div class="display__history" id="history"></div>
      <div class="display__current" id="display">0</div>
    </div>

    <div class="keys">
      <button class="key key--func" data-action="clear">AC</button>
      <button class="key key--func" data-action="sign">+/−</button>
      <button class="key key--func" data-action="percent">%</button>
      <button class="key key--op" data-op="/">÷</button>

      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key key--op" data-op="*">×</button>

      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key key--op" data-op="-">−</button>

      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key key--op" data-op="+">+</button>

      <button class="key key--back" data-action="back">⌫</button>
      <button class="key" data-digit="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key--equals" data-action="equals">=</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
