<!DOCTYPE html>
<html lang = "ko">
<head>
    <meta charset = 'UTF-8'>
    <title>노인과바다</title>
</head>
<body>
    <!-- 제목의 크기 6단계 h1~h6까지 -->
    <h1>h1 노인과 바다</h1>
    <h2>h2 저자 어니스트 헤밍웨이</h2>
    <h3>h3 1953년 퓰리처상 수상작</h3>
    <h4>h4 출판사 한빛</h4>
    <h5>h5 미국문학의 개척작</h5>
    <h6>h6 기껏 손낚시로 청새치 잡았더니 상어맘이 된 건에 대하여</h6>
    <!-- 문단 글 한덩어리 -->
    <p>
        He was an old man who fished alone in a skiff in the Gulf Stream <br>
        and he had gone eighty-four days now without taking a fish
    </p>
    <!-- 문단 구분은 새로 <p></p>를 사용하는것으로 하는듯하다 -->
    <p>
        그는 멕시코 만류에서 혼자 손낚시를 하는 노인으로 <br> 
        <!-- 단바꿈은 br이라는듯 -->
        고기를 마지막으로 낚은지 여든하고도 나흘이 지난 참이었다
    </p>
</body>
</html>
