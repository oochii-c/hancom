<!DOCTYPE>
<html lang = "ko">
    <head> 
        <!-- head 영역 상단 탭 내 텍스트만 확인 가능하며 사용언어 설정및 문자 유실 방지 -->
        <meta charset="UTF-8">
        <title>이십층</title>
    </head>
    <body>
        <!-- 알찬 본문 내용 -->
        <h1>이번주 게스트 카더가든</h1>
        <h2><strong>양념치킨</strong>과 함께하는 <br> 칼춤쇼show</h2> 
        <!-- strong으로 볼드체 강조처리 가능 그리고 태그 안에 태그가 들어가있는 것을 중첩이라 함 -->
        <p>카더가든 신곡 출시</p>
        <!-- 텍스트 내에서 <>& 기호를 사용하려면 &lt; &gt; &amp; 를 활용해야함 -->        
        <p>덥다 &lt;너무더워&gt;</p>
    </body>
</html>
