<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css">
    <title>virtual elements</title>
</head>
<body>
    <h4>virtual insanity</h4>
    <!--css가 before 앞에 별을 붙여준다-->
    <h5 class="start-title">favorite</h5>
    <!--before 와 after 로 양옆에 따옴표가 생긴다-->
    <p class="quote">virtual not in html</p>
    <!-- after로 글자 아래 파란줄이 그어진다-->
    <p class="underline-deco">underlined text</p>
</body>
</html>
