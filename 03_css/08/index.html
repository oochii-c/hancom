<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css">
    <title>카드 뒤집기</title>
</head>
<body>
    <h1>카드 뒤집기</h1>
    <!--card 바깥을 -->
    <div class="card">
        <!--inner 실제로 회전하는 부분-->
        <div class="inner">
            <!--평소 보이는면-->
            <div class="front">앞면</div>
            <!--회전하면 보이는 면 -->
            <div class="back">뒷면</div>
        </div>
    </div>
    <br><br>
    <div class="trump">
        <div class="inside">
            <div class="up"><img width="200" height="350" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Ace_of_spades.svg/250px-Ace_of_spades.svg.png?_=20150115015447" placeholder="앞면"></div>
            <div class="down"><img width="200" height="350" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0ir4ckwOW5yZpVeRhhjBiUxUyHZKnX5F-dccpKVyOOPoi9ObmNlu9SESC&s=10" placeholder="뒷면"></div>
        </div> 
    </div>
</body>
</html>
